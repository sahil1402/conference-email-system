name: CI

# Runs the test suite, eval harness, and frontend typecheck on every push/PR to main.
#
# SECRETS: none required. This pipeline is intentionally secret-free — it exercises
# the default pipeline path (keyword classifier + BM25 retriever + no-key drafter
# fallback), which needs no external API. Do NOT add a job that depends on an
# external provider API key here; the drafter degrades to a safe fallback with no
# key, so all three jobs below run on a fresh fork with zero secrets configured.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1 — backend unit/integration tests.
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run tests
        run: python -m pytest tests/ -v

  # Job 2 — eval harness. Runs only if the tests pass; publishes the JSON report
  # as a build artifact so per-commit eval metrics are inspectable without a local run.
  eval:
    name: Eval harness
    needs: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      # --no-retrieval-metrics keeps CI lean + secret-free: the end-to-end run uses
      # the default BM25 backend (reads the KB JSON, no DB, no embedding-model
      # download). The retrieval-only FAISS comparison is skipped in CI.
      - name: Run eval
        run: python scripts/run_eval.py --no-retrieval-metrics --output reports/ci_eval_report.json
      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: backend/reports/ci_eval_report.json

  # Job 3 — frontend typecheck.
  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm install
      - name: Typecheck
        run: npx tsc --noEmit
