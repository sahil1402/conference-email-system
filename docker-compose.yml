# One-command local spin-up: `docker compose up --build`
# → backend on http://localhost:8000, frontend on http://localhost:3000,
#   db (PostgreSQL) on 127.0.0.1:5432
#
# Persistence is PostgreSQL (the `db` service). The backend's DATABASE_URL is
# built from the SAME POSTGRES_* values as the db service (single source of
# truth), using the asyncpg driver. The app's async engine AND Alembic both read
# that one URL — there is no separate sync URL. Override POSTGRES_USER /
# POSTGRES_PASSWORD / POSTGRES_DB via the shell or a repo-root .env; each
# defaults to `confmail`.

services:
  db:
    image: postgres:16-alpine
    # These POSTGRES_* values are the single source of truth for the database
    # credentials. The backend service (see TASK 2) builds its DATABASE_URL from
    # the SAME ${POSTGRES_*} interpolation, so one place drives both.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-confmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-confmail}
      POSTGRES_DB: ${POSTGRES_DB:-confmail}
    ports:
      # Bind to loopback ONLY — never 0.0.0.0. The DB must not be reachable from
      # other hosts on the network; only the compose backend (same network) and
      # localhost tooling need it.
      - "127.0.0.1:5432:5432"
    volumes:
      # Named volume → Postgres data survives `docker compose down`.
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready gates dependents (backend depends_on: service_healthy).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-confmail} -d ${POSTGRES_DB:-confmail}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      # Context is the repo root so the image can include <root>/data, which the
      # pipeline reads relative to the source tree. Dockerfile lives in backend/.
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Single source of truth: built from the SAME ${POSTGRES_*} values the db
      # service uses, with the asyncpg driver. The app's async engine and Alembic
      # both read this one URL. `db` is the compose-network hostname for the
      # Postgres service (NOT 127.0.0.1 — that binding is for host access only).
      # Set here in `environment:` so it takes precedence over any DATABASE_URL
      # that might be present in backend/.env under compose.
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-confmail}:${POSTGRES_PASSWORD:-confmail}@db:5432/${POSTGRES_DB:-confmail}
    # Optional local overrides (secrets, provider selection). Not required —
    # with no .env the app runs on its safe defaults (keyword classifier, BM25
    # retriever, no-key drafter fallback), which need zero external services.
    env_file:
      - path: backend/.env
        required: false
    depends_on:
      # Wait for Postgres to pass its pg_isready healthcheck before the backend
      # starts (the Dockerfile CMD runs `alembic upgrade head` on boot).
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time; must be browser-reachable
        # (the host), so localhost — not the `backend` service name.
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
